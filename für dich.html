<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eine persönliche Nachricht</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Umschlag-Container */
        .envelope-wrapper {
            position: relative;
            width: 450px;
            height: 300px;
            background-color: #e5e7eb;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .envelope-wrapper:hover {
            transform: translateY(-5px);
        }

        /* Die obere Klappe des Briefumschlags */
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 225px solid transparent;
            border-right: 225px solid transparent;
            border-top: 150px solid #d1d5db;
            transform-origin: top;
            transition: transform 0.4s ease 0.2s, z-index 0.2s ease 0.2s;
            z-index: 3;
        }
        
        .envelope-front {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #e5e7eb 0%, #d1d5db 100%);
            border-radius: 0 0 8px 8px;
            z-index: 2;
            overflow: hidden;
        }
        
        /* Ein schönes Siegel / Button zum Drücken */
        .seal {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #c8a2c8;
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(200, 162, 200, 0.4);
            z-index: 5;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        /* Das Briefpapier im Inneren */
        .letter {
            position: absolute;
            top: 10px;
            left: 25px;
            width: 400px;
            background-color: #ffffff;
            border-radius: 4px;
            padding: 40px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            z-index: 1;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), z-index 0.1s ease;
            transform: translateY(0);
            max-height: 280px;
            opacity: 0.8;
        }

        /* Wenn der Brief geöffnet wird */
        .envelope-wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 0;
            transition: transform 0.4s ease, z-index 0.2s ease 0.4s;
        }

        .envelope-wrapper.open .letter {
            transform: translateY(-310px) scale(1.02);
            z-index: 10;
            max-height: none;
            opacity: 1;
            height: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.4s, z-index 0.1s ease 0.4s;
        }

        .envelope-wrapper.open .seal {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        /* Brief-Inhalt Styling */
        .letter-title {
            color: #d9534f;
            font-size: 22px;
            font-weight: 400;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: -0.5px;
        }
        
        .letter-divider {
            width: 40px;
            height: 1px;
            background-color: #e5e7eb;
            margin: 0 auto 25px auto;
        }

        .letter-text {
            color: #4b5563;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 15px;
            text-align: center;
        }

        .letter-footer {
            margin-top: 30px;
            text-align: center;
            font-size: 13px;
            color: #9ca3af;
        }
        
        .reply-btn {
            display: inline-block;
            margin-top: 25px;
            background-color: #c8a2c8;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            transition: background-color 0.2s, transform 0.2s;
            box-shadow: 0 4px 10px rgba(200, 162, 200, 0.2);
        }
        .reply-btn:hover {
            background-color: #b58eb5;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <!-- Briefumschlag -->
    <div class="envelope-wrapper" id="envelope">
        <!-- Obere Klappe -->
        <div class="flap"></div>
        
        <!-- Das Siegel / Der Button -->
        <div class="seal">Drück mich ✨</div>
        
        <!-- Vorderseite des Umschlags -->
        <div class="envelope-front"></div>
        
        <!-- Das versteckte Blatt Papier (Der Brief) -->
        <div class="letter">
            <h1 class="letter-title">Für dich ❤️</h1>
            <div class="letter-divider"></div>
            
            <p class="letter-text">
                hey ich wollte mich entschuldigen dafür das ich dich etwas gestern genervt habe wegen dein schnurbart.
            </p>
            <p class="letter-text">
                ich wollte mich dafür entschulifgen und dir sagen ich liebe dich überalles verzeihst du mir ?
            </p>
            
            <div class="letter-footer">
                <a href="#" class="reply-btn" id="replyBtn">Ja, ich verzeihe dir! ☕</a>
            </div>
        </div>
    </div>

    <script>
        const envelope = document.getElementById('envelope');
        const replyBtn = document.getElementById('replyBtn');

        // Klick-Event für den Umschlag zum Öffnen
        envelope.addEventListener('click', function(e) {
            if (e.target.classList.contains('reply-btn')) return;
            this.classList.toggle('open');
        });

        // Klick-Event für den Antwort-Button
        replyBtn.addEventListener('click', function(e) {
            e.preventDefault();
            // Ersetze hier bei Bedarf deine E-Mail-Adresse
            window.location.href = "mailto:deine-email@beispiel.de?subject=Ich verzeihe dir! ❤️";
        });
    </script>
</body>
</html>
