<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eine persönliche Nachricht</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Haupt-Container hält alles im Zentrum */
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 500px;
        }

        /* Container für den Umschlag */
        .container {
            position: relative;
            width: 450px;
            height: 300px;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Wenn geöffnet, sinkt der Umschlag leicht nach unten, um Platz zu machen */
        .container.open {
            transform: translateY(80px);
        }

        /* Umschlag-Basis */
        .envelope-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #e5e7eb;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            cursor: pointer;
        }

        /* Die obere Klappe */
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 225px solid transparent;
            border-right: 225px solid transparent;
            border-top: 150px solid #d1d5db;
            transform-origin: top;
            transition: transform 0.4s ease 0.2s, z-index 0.2s ease 0.2s;
            z-index: 3;
        }
        
        .envelope-front {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #e5e7eb 0%, #d1d5db 100%);
            border-radius: 0 0 8px 8px;
            z-index: 2;
        }
        
        /* Siegel auf der Klappe */
        .seal {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #c8a2c8;
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(200, 162, 200, 0.4);
            z-index: 5;
            transition: opacity 0.3s ease;
            text-align: center;
        }
        
        /* Das Briefpapier */
        .letter {
            position: absolute;
            top: 15px;
            left: 25px;
            width: 400px;
            background-color: #ffffff;
            border-radius: 6px;
            padding: 30px 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            z-index: 1;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
            transform: translateY(0);
            opacity: 0;
        }

        /* Animationen im geöffneten Zustand */
        .container.open .flap {
            transform: rotateX(180deg);
            z-index: 0;
            transition: transform 0.4s ease, z-index 0.2s ease 0.4s;
        }

        /* Der Brief fährt moderat nach oben, perfekt lesbar */
        .container.open .letter {
            transform: translateY(-210px);
            z-index: 10;
            opacity: 1;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.12);
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.3s, opacity 0.5s ease 0.3s;
        }

        .container.open .seal {
            opacity: 0;
            pointer-events: none;
        }

        /* Brief-Inhalt Styling */
        .letter-title {
            color: #d9534f;
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 12px;
            text-align: center;
        }
        
        .letter-divider {
            width: 40px;
            height: 1px;
            background-color: #e5e7eb;
            margin: 0 auto 18px auto;
        }

        .letter-text {
            color: #4b5563;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 12px;
            text-align: center;
        }
        
        /* Der Verzeihen-Button: Komplett getrennt und liegt UNTER dem Umschlag */
        .action-area {
            margin-top: 110px; /* Schafft Platz unter dem abgesunkenen Umschlag */
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .reply-btn {
            background-color: #c8a2c8;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
            transition: opacity 0.8s ease, transform 0.8s ease, background-color 0.2s;
            box-shadow: 0 4px 15px rgba(200, 162, 200, 0.3);
        }
        
        /* Wird erst nach dem Timer per JavaScript sichtbar */
        .reply-btn.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        
        .reply-btn:hover {
            background-color: #b58eb5;
            transform: scale(1.03);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- Container für Briefumschlag und Brief -->
        <div class="container" id="cardContainer">
            <div class="envelope-wrapper" id="envelope">
                <div class="flap"></div>
                <div class="seal">Drück mich ✨</div>
                <div class="envelope-front"></div>
                
                <!-- Das Briefpapier (Jetzt sauber strukturiert ohne störenden Button) -->
                <div class="letter">
                    <h1 class="letter-title">Für dich ❤️</h1>
                    <div class="letter-divider"></div>
                    
                    <p class="letter-text">
                        hey ich wollte mich entschuldigen dafür das ich dich etwas gestern genervt habe wegen dein schnurbart.
                    </p>
                    <p class="letter-text">
                        ich wollte mich dafür entschulifgen und dir sagen ich liebe dich überalles verzeihst du mir ?
                    </p>
                </div>
            </div>
        </div>

        <!-- Antwort-Bereich ganz unten drunter -->
        <div class="action-area">
            <a href="#" class="reply-btn" id="replyBtn">Ja, ich verzeihe dir! ☕</a>
        </div>
    </div>

    <script>
        const cardContainer = document.getElementById('cardContainer');
        const envelope = document.getElementById('envelope');
        const replyBtn = document.getElementById('replyBtn');
        let timeoutId = null;

        // Klick-Event auf den Umschlag zum Öffnen/Schließen
        envelope.addEventListener('click', function() {
            const isOpen = cardContainer.classList.toggle('open');
            
            if (isOpen) {
                // Wenn geöffnet: Warte exakt 4 Sekunden, dann blende den Button ruhig ein
                timeoutId = setTimeout(() => {
                    replyBtn.classList.add('show');
                }, 4000);
            } else {
                // Wenn wieder geschlossen: Button sofort verstecken
                clearTimeout(timeoutId);
                replyBtn.classList.remove('show');
            }
        });

        // Klick-Event für den Antwort-Button
        replyBtn.addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = "mailto:deine-email@beispiel.de?subject=Ich verzeihe dir! ❤️";
        });
    </script>
</body>
</html>
